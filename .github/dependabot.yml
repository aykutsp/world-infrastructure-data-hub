version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
  - package-ecosystem: npm
    directory: /libraries/typescript
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(lib/ts)"
