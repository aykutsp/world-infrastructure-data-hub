version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
    ignore:
      # Keep TypeScript and ESLint on the same major version as the project until
      # we explicitly opt in — majors tend to ship breaking changes that need a
      # manual smoke-test pass.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "eslint"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/js"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript-eslint"
        update-types: ["version-update:semver-major"]
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    commit-message:
      prefix: "ci"
  - package-ecosystem: npm
    directory: /libraries/typescript
    schedule:
      interval: monthly
    commit-message:
      prefix: "deps(lib/ts)"
    ignore:
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
